# 此工作流会根据PR中修改的文件路径自动添加标签
#
# 使用此工作流前，需要先配置.GitHub/labeler.yml文件
# 更多信息请参考: https://github.com/actions/labeler

name: 自动标签
on: [pull_request_target]  # 监听PR目标事件

permissions:
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest  # 在最新版Ubuntu上运行
    permissions:
      contents: read  # 读取仓库内容权限
      pull-requests: write  # 写入PR权限

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/labeler@ac9175f8a1f3625fd0d4fb234536d26811351594 # v4.3.0
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"  # 使用仓库token进行认证